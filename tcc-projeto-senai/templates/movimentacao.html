<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Estoque - SENAI</title>
    <link rel="stylesheet" href="static/movimentacao.css">
    <link rel="icon" type="image/png" href="static/iconecaixa.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</head>


<body>

    <div class="barra-topo">
        <nav id="navlateral" class="navbar navbar-light">
            <div class="container-fluid p-0">
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel" style="left: 0px;">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu de Navegação</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-start flex-grow-1 pe-3">
                            <li class="nav-item mb-2">
                                <li class="login-user-name-1">
                                    <a class="nav-link active" aria-current="page" href="/">
                                        <img src="static/login-user-name-1.png" alt="Login Icon" class="me-2" style="width: 16px; height: 16px; object-fit: contain;">Login
                                    </a>
                                <li class="List">
                                        <a class="nav-link active" aria-current="page" href="/home">
                                            <img src="static/List.png" alt="Login Icon" class="me-2" style="width: 16px; height: 16px; object-fit: contain;">Lista de Materiais
                                        </a> 
                                <a class="nav-link" href="/cadastro">
                                    <i class="fa-solid fa-box-open me-2"></i>Cadastro de Item
                                </a>
                            </li>
                            <li class="nav-item mb-2">
                                <a class="nav-link active" aria-current="page" href="/move">
                                    <i class="fa-solid fa-right-left me-2"></i>Movimentação de Estoque
                                </a>
                            </li>
                            </li>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    
        <img src="static/senaioficial.png" style="width: 180px; height: auto; margin-left: 5px;">
    </div>



<div class="main-wrapper">

    <div class="container-formulario">

        <div class="text-center mb-4">
            <img src="static/senaioficial.png" width="350" height="85">
        </div>

        <h3 style="color:#002A54;text-align:center;font-weight:700;margin-bottom:25px;">
            MOVIMENTAÇÃO DE ESTOQUE
        </h3>

        <form id="formMovimentacao">

            <div class="input-group mb-3">
                <span class="input-group-text">Item</span>
                <select name="item" class="form-control" required>
                    <option value="">Selecione o item</option>
                    <option>Trenas</option>
                    <option>Parafuso</option>
                    <option>Alicates</option>
                    <option>Chave de Fenda</option>
                </select>
            </div>
        
            <div class="input-group mb-3">
                <span class="input-group-text">Quantidade</span>
                <input type="number" class="form-control" name="quantidade" min="1" placeholder="0" required>
            </div>
        
            <div class="input-group mb-3">
                <span class="input-group-text">Tipo</span>
                <select name="tipo" id="tipoMovimentacao" class="form-control" required>
                    <option value="">Selecione</option>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
        
            <div id="campoFinalidade" class="input-group mb-3">
                <span class="input-group-text">Finalidade</span>
                <textarea name="finalidade" id="finalidade" class="form-control" placeholder="Digite a justificativa aqui..."></textarea>
            </div>
        
            <br>
            <button type="submit" class="btn-enviar">
                SOLICITAR MOVIMENTAÇÃO
            </button>
        
        </form>

</div>


<script>

const tipo = document.getElementById("tipoMovimentacao");
const campoFinalidade = document.getElementById("campoFinalidade");
const finalidade = document.getElementById("finalidade");

tipo.addEventListener("change", function() {

    if (this.value === "saida") {

        campoFinalidade.style.display = "block";
        finalidade.required = true;

    } else {

        campoFinalidade.style.display = "none";
        finalidade.required = false;
        finalidade.value = "";

    }

});

document.getElementById("formMovimentacao").addEventListener("submit", function(e){

    e.preventDefault();

    const formData = new FormData(this);

    fetch('/solicitar-movimentacao', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {

    if(data.status === 'sucesso'){

        Swal.fire({
            icon: 'success',
            title: 'Movimentação registrada!',
            text: data.mensagem,
            confirmButtonColor: '#FF8C00',
            timer: 2500,
            timerProgressBar: true,
            showConfirmButton: false
        });

        this.reset();
        campoFinalidade.style.display = "none";
    }

})
    .catch(error => {

    console.error(error);

    Swal.fire({
        icon: 'error',
        title: 'Erro',
        text: 'Erro ao enviar movimentação.',
        confirmButtonColor: '#FF8C00'
    });

});

});

</script>

</body>
</html>
